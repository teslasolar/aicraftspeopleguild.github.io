<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚠ Log Entry · ACG</title>
<link rel="stylesheet" href="../../../L2/scada/gateway/styles/theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:linear-gradient(135deg,#faf6f0,#f0e8d8 50%,#f5ece0);color:var(--tx);font-family:var(--ff-body);font-size:13px}
.hd{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bd);box-shadow:0 1px 3px var(--sh);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd h1{font-family:var(--ff-display);font-weight:700;font-size:17px;letter-spacing:.3px}
.hd h1 span{font-weight:400;color:var(--dm);font-size:13px;margin-left:6px}
.hd a{color:var(--tl);text-decoration:none;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);border:1px solid transparent}
.hd a:hover{background:var(--tlb);border-color:var(--tl)}
.hd .spacer{flex:1}
.wrap{padding:24px;max-width:640px;margin:0 auto}
.form-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:24px;box-shadow:0 1px 6px var(--sh)}
.form-card h2{font-family:var(--ff-display);font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px}
.form-card .lede{font-size:12px;color:var(--dm);line-height:1.5;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--bd2)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{font-size:11px;font-weight:600;color:var(--dm);text-transform:uppercase;letter-spacing:.5px}
.field .hint{font-size:10px;color:var(--ft);margin-top:1px}
.field input,.field select,.field textarea{padding:8px 10px;background:var(--inp);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:var(--ff-mono);font-size:12px;color:var(--tx);outline:none;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--tl)}
.field textarea{resize:vertical;min-height:80px;font-size:11px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.level-ERROR{color:var(--rs)}
.level-WARN{color:var(--am)}
.level-INFO{color:var(--tl)}
.level-DEBUG{color:var(--ft)}
.actions{display:flex;gap:10px;margin-top:6px}
.btn-primary{flex:1;padding:10px;background:var(--tl);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--ff-body);font-size:13px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:var(--tl2)}
.btn-reset{padding:10px 18px;background:var(--inp);color:var(--dm);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:var(--ff-body);font-size:12px;font-weight:600;cursor:pointer}
.btn-reset:hover{border-color:var(--tl);color:var(--tl)}
</style>
</head>
<body>
<div class="hd">
  <h1>⚠ Log Entry<span>· ACG incident log</span></h1>
  <a href="../../plc/index.html">← plc</a>
  <a href="../tag-write/index.html">tag write</a>
  <a href="../../../index.html">enterprise</a>
  <a href="../../../L2/scada/gateway/gateway-log.html">gateway log</a>
  <span class="spacer"></span>
</div>
<div class="wrap">
  <div class="form-card">
    <h2>⚠ Append a log entry</h2>
    <p class="lede">Creates a GitHub Issue pre-filled with the log entry. The <code>sync-db</code> workflow appends it to <code>errors.ring</code>.</p>
    <form id="form" novalidate>
      <div class="row">
        <div class="field">
          <label>Level *</label>
          <select id="level">
            <option value="ERROR">ERROR</option>
            <option value="WARN">WARN</option>
            <option value="INFO">INFO</option>
            <option value="DEBUG">DEBUG</option>
          </select>
        </div>
        <div class="field">
          <label>Logger *</label>
          <input id="logger" required placeholder="p2p" spellcheck="false">
          <span class="hint">Module / source name</span>
        </div>
      </div>
      <div class="field">
        <label>Message *</label>
        <input id="message" required placeholder="tracker.openwebtorrent.com — WSS handshake failed" spellcheck="false">
      </div>
      <div class="field">
        <label>Stack / context (optional)</label>
        <textarea id="stack" placeholder="Error: WSS connection failed&#10;    at WebTorrent.connect (webtorrent.js:42)" rows="4"></textarea>
      </div>
      <div class="field">
        <label>Meta JSON (optional)</label>
        <textarea id="meta" placeholder='{ "url": "wss://tracker.openwebtorrent.com", "attempt": 3 }' rows="3"></textarea>
        <span class="hint">Arbitrary JSON object for extra context</span>
      </div>
      <div class="actions">
        <button type="submit" class="btn-primary">Open GitHub Issue →</button>
        <button type="reset" class="btn-reset">Reset</button>
      </div>
    </form>
  </div>
</div>

<script>
const GITHUB_ISSUE_URL = 'https://github.com/teslasolar/aicraftspeopleguild.github.io/issues/new';

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const level   = document.getElementById('level').value;
  const logger  = document.getElementById('logger').value.trim();
  const message = document.getElementById('message').value.trim();
  const stack   = document.getElementById('stack').value.trim();
  const meta    = document.getElementById('meta').value.trim();

  if (!logger || !message) {
    alert('Logger and message are required.');
    return;
  }

  const title = `⚠ [${level}] ${message.slice(0, 60)}${message.length > 60 ? '…' : ''}`;
  const body = [
    `### Level\n${level}`,
    `### Logger\n${logger}`,
    `### Message\n${message}`,
    stack ? `### Stack / context\n\`\`\`\n${stack}\n\`\`\`` : null,
    meta  ? `### Meta\n\`\`\`json\n${meta}\n\`\`\`` : null,
  ].filter(Boolean).join('\n\n');

  const url = new URL(GITHUB_ISSUE_URL);
  url.searchParams.set('title', title);
  url.searchParams.set('labels', 'acg-db,log-entry');
  url.searchParams.set('body', body);
  window.open(url.toString(), '_blank', 'noopener');
});
</script>
</body>
</html>
