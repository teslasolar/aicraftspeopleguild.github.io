<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980" width="720" height="980"
     role="img" aria-label="{{HMI_TITLE}} — ISA-95 HMI Overview">
  <!--
  ══════════════════════════════════════════════════════════════════════════
  PAGE: hmi-page.svg
  ISA-95 hierarchical HMI overview panel.
  Sections:
    [36px]  titlebar
    [24px]  breadcrumb nav
    [180px] LEVEL TREE — Enterprise→Site→Area→Line→Cell columns
    [16px]  gap
    [72px]  METRIC ROW — 3 live metrics
    [16px]  gap
    [200px] TAG TABLE — 8 tag rows (path / value / units / status / ts)
    [16px]  gap
    [90px]  ALERT STACK — 3 alert rows
    [16px]  gap
    [90px]  ECG FOOTER
    [16px]  gap
    [20px]  footer
  Total: 980px
  ══════════════════════════════════════════════════════════════════════════
  TOKENS (80 total):
    HMI_TITLE  HMI_TS  HMI_VERSION

    Breadcrumb: BC_ENT  BC_SITE  BC_AREA  BC_LINE  BC_CELL

    Level tree nodes ×5 levels: LV1_LB LV1_VA LV1_CO  … LV5_LB LV5_VA LV5_CO

    Metrics ×3: M1_LB M1_VA M1_CO  M2_LB M2_VA M2_CO  M3_LB M3_VA M3_CO

    Tag rows ×8: TAG1_PATH TAG1_VAL TAG1_UNIT TAG1_ST TAG1_CO  … TAG8

    Alerts ×3: AL1_SEV AL1_MSG AL1_CO AL1_TS
               AL2_SEV AL2_MSG AL2_CO AL2_TS
               AL3_SEV AL3_MSG AL3_CO AL3_TS

    Heartbeat: HB_STATUS  HB_STATUS_CO  HB_TS
  -->
  <defs>
    <linearGradient id="hg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"   stop-color="#161b22"/>
      <stop offset=".2"  stop-color="#0d1117"/>
      <stop offset="1"   stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .hdr{fill:#484f58;font-size:10px;letter-spacing:1px}
      .pulse{animation:pp 1.8s ease-out infinite;transform-origin:660px 894px}
      @keyframes pp{0%{transform:scale(1);opacity:.7}55%{transform:scale(2.2);opacity:0}100%{opacity:0}}
    </style>
  </defs>

  <rect width="720" height="980" rx="10" fill="url(#hg)"/>

  <!-- ══ TITLEBAR ════════════════════════════════════════════════════ -->
  <rect x="0" y="0"  width="720" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="720" height="10"  fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="360" y="22" text-anchor="middle" class="t" font-size="11" fill="#8b949e">&#x2638; {{HMI_TITLE}}</text>

  <!-- ══ BREADCRUMB (y=44) ═══════════════════════════════════════════ -->
  <text x="16"  y="58" class="t" font-size="11" fill="#79c0ff">{{BC_ENT}}</text>
  <text x="88"  y="58" class="t" font-size="11" fill="#484f58">&#x203A;</text>
  <text x="100" y="58" class="t" font-size="11" fill="#79c0ff">{{BC_SITE}}</text>
  <text x="172" y="58" class="t" font-size="11" fill="#484f58">&#x203A;</text>
  <text x="184" y="58" class="t" font-size="11" fill="#79c0ff">{{BC_AREA}}</text>
  <text x="256" y="58" class="t" font-size="11" fill="#484f58">&#x203A;</text>
  <text x="268" y="58" class="t" font-size="11" fill="#79c0ff">{{BC_LINE}}</text>
  <text x="340" y="58" class="t" font-size="11" fill="#484f58">&#x203A;</text>
  <text x="352" y="58" class="t" font-size="11" fill="#e6edf3" font-weight="700">{{BC_CELL}}</text>

  <!-- ══ ISA-95 LEVEL TREE (y=70–250) ═══════════════════════════════ -->
  <rect x="16"  y="70" width="688" height="180" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- column headers -->
  <text x="86"  y="92" class="t hdr" text-anchor="middle">L4 ENTERPRISE</text>
  <text x="220" y="92" class="t hdr" text-anchor="middle">L3 SITE</text>
  <text x="354" y="92" class="t hdr" text-anchor="middle">L2 AREA</text>
  <text x="488" y="92" class="t hdr" text-anchor="middle">L1 LINE</text>
  <text x="622" y="92" class="t hdr" text-anchor="middle">L0 CELL</text>

  <!-- column separator lines -->
  <line x1="152" y1="78" x2="152" y2="242" stroke="#21262d" stroke-width="1"/>
  <line x1="286" y1="78" x2="286" y2="242" stroke="#21262d" stroke-width="1"/>
  <line x1="420" y1="78" x2="420" y2="242" stroke="#21262d" stroke-width="1"/>
  <line x1="554" y1="78" x2="554" y2="242" stroke="#21262d" stroke-width="1"/>
  <line x1="32"  y1="100" x2="700" y2="100" stroke="#21262d" stroke-width=".5"/>

  <!-- tree connector lines -->
  <line x1="152" y1="160" x2="170" y2="160" stroke="#30363d" stroke-width="1"/>
  <line x1="286" y1="160" x2="304" y2="160" stroke="#30363d" stroke-width="1"/>
  <line x1="420" y1="160" x2="438" y2="160" stroke="#30363d" stroke-width="1"/>
  <line x1="554" y1="160" x2="572" y2="160" stroke="#30363d" stroke-width="1"/>

  <!-- Level cards -->
  <!-- L4 -->
  <rect x="32"  y="116" width="104" height="80" rx="6" fill="#0d1117" stroke="{{LV1_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="84"  y="146" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">{{LV1_LB}}</text>
  <text x="84"  y="172" class="t" font-size="16" font-weight="700" fill="{{LV1_CO}}" text-anchor="middle">{{LV1_VA}}</text>
  <!-- L3 -->
  <rect x="170" y="116" width="104" height="80" rx="6" fill="#0d1117" stroke="{{LV2_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="222" y="146" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">{{LV2_LB}}</text>
  <text x="222" y="172" class="t" font-size="16" font-weight="700" fill="{{LV2_CO}}" text-anchor="middle">{{LV2_VA}}</text>
  <!-- L2 -->
  <rect x="304" y="116" width="104" height="80" rx="6" fill="#0d1117" stroke="{{LV3_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="356" y="146" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">{{LV3_LB}}</text>
  <text x="356" y="172" class="t" font-size="16" font-weight="700" fill="{{LV3_CO}}" text-anchor="middle">{{LV3_VA}}</text>
  <!-- L1 -->
  <rect x="438" y="116" width="104" height="80" rx="6" fill="#0d1117" stroke="{{LV4_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="490" y="146" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">{{LV4_LB}}</text>
  <text x="490" y="172" class="t" font-size="16" font-weight="700" fill="{{LV4_CO}}" text-anchor="middle">{{LV4_VA}}</text>
  <!-- L0 -->
  <rect x="572" y="116" width="104" height="80" rx="6" fill="#0d1117" stroke="{{LV5_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="624" y="146" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">{{LV5_LB}}</text>
  <text x="624" y="172" class="t" font-size="16" font-weight="700" fill="{{LV5_CO}}" text-anchor="middle">{{LV5_VA}}</text>

  <!-- ══ METRIC ROW (y=266–338) ══════════════════════════════════════ -->
  <rect x="16" y="266" width="688" height="72" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="142" y="288" class="t" font-size="10" fill="#484f58" text-anchor="middle" letter-spacing="1">{{M1_LB}}</text>
  <text x="142" y="326" class="t" font-size="30" font-weight="700" fill="{{M1_CO}}" text-anchor="middle">{{M1_VA}}</text>
  <line x1="228" y1="278" x2="228" y2="330" stroke="#21262d" stroke-width="1"/>
  <text x="360" y="288" class="t" font-size="10" fill="#484f58" text-anchor="middle" letter-spacing="1">{{M2_LB}}</text>
  <text x="360" y="326" class="t" font-size="30" font-weight="700" fill="{{M2_CO}}" text-anchor="middle">{{M2_VA}}</text>
  <line x1="476" y1="278" x2="476" y2="330" stroke="#21262d" stroke-width="1"/>
  <text x="578" y="288" class="t" font-size="10" fill="#484f58" text-anchor="middle" letter-spacing="1">{{M3_LB}}</text>
  <text x="578" y="326" class="t" font-size="30" font-weight="700" fill="{{M3_CO}}" text-anchor="middle">{{M3_VA}}</text>

  <!-- ══ TAG TABLE (y=354–554) ══════════════════════════════════════ -->
  <text x="16"  y="372" class="t hdr">TAG PATH</text>
  <text x="350" y="372" class="t hdr">VALUE</text>
  <text x="450" y="372" class="t hdr">UNIT</text>
  <text x="536" y="372" class="t hdr">STATUS</text>
  <text x="704" y="372" class="t hdr" text-anchor="end">TIMESTAMP</text>
  <line x1="16"  y1="378" x2="704" y2="378" stroke="#21262d" stroke-width="1"/>

  <!-- tag rows 22px each (baselines: 396 418 440 462 484 506 528 550) -->
  <!-- Row 1 -->
  <text x="16"  y="396" class="t" font-size="11" fill="#79c0ff">{{TAG1_PATH}}</text>
  <text x="350" y="396" class="t" font-size="11" fill="#e6edf3">{{TAG1_VAL}}</text>
  <text x="450" y="396" class="t" font-size="11" fill="#8b949e">{{TAG1_UNIT}}</text>
  <rect x="528" y="384" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG1_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="396" class="t" font-size="10" fill="{{TAG1_CO}}" text-anchor="middle">{{TAG1_ST}}</text>
  <text x="704" y="396" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG1_TS}}</text>
  <line x1="16" y1="404" x2="704" y2="404" stroke="#161b22" stroke-width="1"/>
  <!-- Row 2 -->
  <text x="16"  y="422" class="t" font-size="11" fill="#79c0ff">{{TAG2_PATH}}</text>
  <text x="350" y="422" class="t" font-size="11" fill="#e6edf3">{{TAG2_VAL}}</text>
  <text x="450" y="422" class="t" font-size="11" fill="#8b949e">{{TAG2_UNIT}}</text>
  <rect x="528" y="410" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG2_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="422" class="t" font-size="10" fill="{{TAG2_CO}}" text-anchor="middle">{{TAG2_ST}}</text>
  <text x="704" y="422" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG2_TS}}</text>
  <line x1="16" y1="430" x2="704" y2="430" stroke="#161b22" stroke-width="1"/>
  <!-- Row 3 -->
  <text x="16"  y="448" class="t" font-size="11" fill="#79c0ff">{{TAG3_PATH}}</text>
  <text x="350" y="448" class="t" font-size="11" fill="#e6edf3">{{TAG3_VAL}}</text>
  <text x="450" y="448" class="t" font-size="11" fill="#8b949e">{{TAG3_UNIT}}</text>
  <rect x="528" y="436" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG3_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="448" class="t" font-size="10" fill="{{TAG3_CO}}" text-anchor="middle">{{TAG3_ST}}</text>
  <text x="704" y="448" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG3_TS}}</text>
  <line x1="16" y1="456" x2="704" y2="456" stroke="#161b22" stroke-width="1"/>
  <!-- Row 4 -->
  <text x="16"  y="474" class="t" font-size="11" fill="#79c0ff">{{TAG4_PATH}}</text>
  <text x="350" y="474" class="t" font-size="11" fill="#e6edf3">{{TAG4_VAL}}</text>
  <text x="450" y="474" class="t" font-size="11" fill="#8b949e">{{TAG4_UNIT}}</text>
  <rect x="528" y="462" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG4_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="474" class="t" font-size="10" fill="{{TAG4_CO}}" text-anchor="middle">{{TAG4_ST}}</text>
  <text x="704" y="474" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG4_TS}}</text>
  <line x1="16" y1="482" x2="704" y2="482" stroke="#161b22" stroke-width="1"/>
  <!-- Row 5 -->
  <text x="16"  y="500" class="t" font-size="11" fill="#79c0ff">{{TAG5_PATH}}</text>
  <text x="350" y="500" class="t" font-size="11" fill="#e6edf3">{{TAG5_VAL}}</text>
  <text x="450" y="500" class="t" font-size="11" fill="#8b949e">{{TAG5_UNIT}}</text>
  <rect x="528" y="488" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG5_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="500" class="t" font-size="10" fill="{{TAG5_CO}}" text-anchor="middle">{{TAG5_ST}}</text>
  <text x="704" y="500" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG5_TS}}</text>
  <line x1="16" y1="508" x2="704" y2="508" stroke="#161b22" stroke-width="1"/>
  <!-- Row 6 -->
  <text x="16"  y="526" class="t" font-size="11" fill="#79c0ff">{{TAG6_PATH}}</text>
  <text x="350" y="526" class="t" font-size="11" fill="#e6edf3">{{TAG6_VAL}}</text>
  <text x="450" y="526" class="t" font-size="11" fill="#8b949e">{{TAG6_UNIT}}</text>
  <rect x="528" y="514" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG6_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="526" class="t" font-size="10" fill="{{TAG6_CO}}" text-anchor="middle">{{TAG6_ST}}</text>
  <text x="704" y="526" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG6_TS}}</text>
  <line x1="16" y1="534" x2="704" y2="534" stroke="#161b22" stroke-width="1"/>
  <!-- Row 7 -->
  <text x="16"  y="552" class="t" font-size="11" fill="#79c0ff">{{TAG7_PATH}}</text>
  <text x="350" y="552" class="t" font-size="11" fill="#e6edf3">{{TAG7_VAL}}</text>
  <text x="450" y="552" class="t" font-size="11" fill="#8b949e">{{TAG7_UNIT}}</text>
  <rect x="528" y="540" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG7_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="552" class="t" font-size="10" fill="{{TAG7_CO}}" text-anchor="middle">{{TAG7_ST}}</text>
  <text x="704" y="552" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG7_TS}}</text>
  <line x1="16" y1="560" x2="704" y2="560" stroke="#161b22" stroke-width="1"/>
  <!-- Row 8 -->
  <text x="16"  y="578" class="t" font-size="11" fill="#79c0ff">{{TAG8_PATH}}</text>
  <text x="350" y="578" class="t" font-size="11" fill="#e6edf3">{{TAG8_VAL}}</text>
  <text x="450" y="578" class="t" font-size="11" fill="#8b949e">{{TAG8_UNIT}}</text>
  <rect x="528" y="566" width="60" height="16" rx="3" fill="#161b22" stroke="{{TAG8_CO}}" stroke-width="1" stroke-opacity=".5"/>
  <text x="558" y="578" class="t" font-size="10" fill="{{TAG8_CO}}" text-anchor="middle">{{TAG8_ST}}</text>
  <text x="704" y="578" class="t" font-size="10" fill="#484f58" text-anchor="end">{{TAG8_TS}}</text>

  <!-- ══ ALERT STACK (y=600–690) ════════════════════════════════════ -->
  <line x1="16" y1="600" x2="248" y2="600" stroke="#21262d" stroke-width="1"/>
  <rect x="248" y="588" width="224" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="360" y="605" class="t" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="2">ACTIVE ALERTS</text>
  <line x1="472" y1="600" x2="704" y2="600" stroke="#21262d" stroke-width="1"/>

  <rect x="16"  y="612" width="688" height="26" rx="4" fill="{{AL1_CO}}1A" stroke="{{AL1_CO}}" stroke-width="1" stroke-opacity=".3"/>
  <rect x="16"  y="612" width="4"   height="26" rx="2" fill="{{AL1_CO}}"/>
  <text x="28"  y="630" class="t" font-size="10" font-weight="700" fill="{{AL1_CO}}">{{AL1_SEV}}</text>
  <text x="100" y="630" class="t" font-size="11" fill="#e6edf3">{{AL1_MSG}}</text>
  <text x="700" y="630" class="t" font-size="10" fill="#484f58" text-anchor="end">{{AL1_TS}}</text>

  <rect x="16"  y="644" width="688" height="26" rx="4" fill="{{AL2_CO}}1A" stroke="{{AL2_CO}}" stroke-width="1" stroke-opacity=".3"/>
  <rect x="16"  y="644" width="4"   height="26" rx="2" fill="{{AL2_CO}}"/>
  <text x="28"  y="662" class="t" font-size="10" font-weight="700" fill="{{AL2_CO}}">{{AL2_SEV}}</text>
  <text x="100" y="662" class="t" font-size="11" fill="#e6edf3">{{AL2_MSG}}</text>
  <text x="700" y="662" class="t" font-size="10" fill="#484f58" text-anchor="end">{{AL2_TS}}</text>

  <rect x="16"  y="676" width="688" height="26" rx="4" fill="{{AL3_CO}}1A" stroke="{{AL3_CO}}" stroke-width="1" stroke-opacity=".3"/>
  <rect x="16"  y="676" width="4"   height="26" rx="2" fill="{{AL3_CO}}"/>
  <text x="28"  y="694" class="t" font-size="10" font-weight="700" fill="{{AL3_CO}}">{{AL3_SEV}}</text>
  <text x="100" y="694" class="t" font-size="11" fill="#e6edf3">{{AL3_MSG}}</text>
  <text x="700" y="694" class="t" font-size="10" fill="#484f58" text-anchor="end">{{AL3_TS}}</text>

  <!-- ══ ECG FOOTER STRIP (y=718–808) ══════════════════════════════ -->
  <rect x="16" y="718" width="688" height="90" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <circle class="pulse" cx="660" cy="763" r="14" fill="none" stroke="{{HB_STATUS_CO}}" stroke-width="1.5"/>
  <circle class="pulse" cx="660" cy="763" r="14" fill="none" stroke="{{HB_STATUS_CO}}" stroke-width="1.5" style="animation-delay:.55s"/>
  <circle cx="660" cy="763" r="8" fill="{{HB_STATUS_CO}}"/>
  <text x="660" y="794" class="t" font-size="9" fill="#8b949e" text-anchor="middle" letter-spacing="1">STATUS</text>
  <text x="660" y="806" class="t" font-size="10" font-weight="700" fill="{{HB_STATUS_CO}}" text-anchor="middle">{{HB_STATUS}}</text>
  <path d="M24,763 L90,763 L98,763 L103,744 L108,783 L113,753 L118,763
           L196,763 L201,744 L206,783 L211,753 L216,763
           L300,763 L305,744 L310,783 L315,753 L320,763
           L400,763 L405,744 L410,783 L415,753 L420,763
           L520,763 L525,744 L530,783 L535,753 L540,763
           L630,763"
        fill="none" stroke="{{HB_STATUS_CO}}" stroke-width="1.5" opacity=".6"
        stroke-dasharray="1800" stroke-dashoffset="1800">
    <animate attributeName="stroke-dashoffset" from="1800" to="0" dur="5s" repeatCount="indefinite"/>
  </path>
  <text x="32" y="736" class="t" font-size="10" fill="#484f58">{{HB_TS}}</text>

  <!-- ══ FOOTER ══════════════════════════════════════════════════════ -->
  <line x1="16"  y1="828" x2="704" y2="828" stroke="#21262d" stroke-width="1"/>
  <text x="16"  y="844" class="t" font-size="10" fill="#79c0ff">{{HMI_TS}}</text>
  <text x="704" y="844" class="t" font-size="10" fill="#8b949e" text-anchor="end">{{HMI_VERSION}}</text>
</svg>
