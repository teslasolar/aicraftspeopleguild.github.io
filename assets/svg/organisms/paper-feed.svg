<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300"
     role="img" aria-label="{{FEED_TITLE}}">
  <!--
  TOKENS (23 total):
    FEED_TITLE  FEED_COUNT  TS
    Paper rows (×5): P1_NUM P1_TITLE P1_TAGS P1_DT
                     P2_NUM P2_TITLE P2_TAGS P2_DT
                     P3_NUM P3_TITLE P3_TAGS P3_DT
                     P4_NUM P4_TITLE P4_TAGS P4_DT
                     P5_NUM P5_TITLE P5_TAGS P5_DT
  -->
  <defs><style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style></defs>

  <!-- background -->
  <rect width="720" height="300" rx="10" fill="#0d1117"/>

  <!-- ── TITLEBAR ───────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="720" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="720" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="96" y="22" class="t" font-size="11" fill="#e6edf3" font-weight="600">{{FEED_TITLE}}</text>
  <!-- total count badge -->
  <rect x="648" y="8"  width="56" height="20" rx="10" fill="#1b3a27" stroke="#3fb950" stroke-width="1" stroke-opacity=".5"/>
  <text x="676" y="22" text-anchor="middle" class="t" font-size="10" fill="#3fb950">{{FEED_COUNT}} total</text>

  <!-- ── COLUMN HEADERS ────────────────────────────────────────────── -->
  <text x="16"  y="50" class="t" font-size="10" fill="#484f58" letter-spacing="1">#</text>
  <text x="44"  y="50" class="t" font-size="10" fill="#484f58" letter-spacing="1">TITLE</text>
  <text x="700" y="50" class="t" font-size="10" fill="#484f58" letter-spacing="1" text-anchor="end">DATE</text>
  <line x1="16" y1="56" x2="704" y2="56" stroke="#21262d" stroke-width="1"/>

  <!-- ── ROW 1 (title y=74, tags y=88) ──────────────────────────────── -->
  <text x="16"  y="74"  class="t" font-size="11" fill="#a371f7">{{P1_NUM}}</text>
  <text x="44"  y="74"  class="t" font-size="12" font-weight="700" fill="#e6edf3">{{P1_TITLE}}</text>
  <text x="700" y="74"  class="t" font-size="10" fill="#484f58" text-anchor="end">{{P1_DT}}</text>
  <text x="44"  y="88"  class="t" font-size="10" fill="#8b949e">{{P1_TAGS}}</text>
  <line x1="16" y1="96" x2="704" y2="96" stroke="#161b22" stroke-width="1"/>

  <!-- ── ROW 2 (title y=114, tags y=128) ────────────────────────────── -->
  <text x="16"  y="114"  class="t" font-size="11" fill="#a371f7">{{P2_NUM}}</text>
  <text x="44"  y="114"  class="t" font-size="12" font-weight="700" fill="#e6edf3">{{P2_TITLE}}</text>
  <text x="700" y="114"  class="t" font-size="10" fill="#484f58" text-anchor="end">{{P2_DT}}</text>
  <text x="44"  y="128"  class="t" font-size="10" fill="#8b949e">{{P2_TAGS}}</text>
  <line x1="16" y1="136" x2="704" y2="136" stroke="#161b22" stroke-width="1"/>

  <!-- ── ROW 3 (title y=154, tags y=168) ────────────────────────────── -->
  <text x="16"  y="154"  class="t" font-size="11" fill="#a371f7">{{P3_NUM}}</text>
  <text x="44"  y="154"  class="t" font-size="12" font-weight="700" fill="#e6edf3">{{P3_TITLE}}</text>
  <text x="700" y="154"  class="t" font-size="10" fill="#484f58" text-anchor="end">{{P3_DT}}</text>
  <text x="44"  y="168"  class="t" font-size="10" fill="#8b949e">{{P3_TAGS}}</text>
  <line x1="16" y1="176" x2="704" y2="176" stroke="#161b22" stroke-width="1"/>

  <!-- ── ROW 4 (title y=194, tags y=208) ────────────────────────────── -->
  <text x="16"  y="194"  class="t" font-size="11" fill="#a371f7">{{P4_NUM}}</text>
  <text x="44"  y="194"  class="t" font-size="12" font-weight="700" fill="#e6edf3">{{P4_TITLE}}</text>
  <text x="700" y="194"  class="t" font-size="10" fill="#484f58" text-anchor="end">{{P4_DT}}</text>
  <text x="44"  y="208"  class="t" font-size="10" fill="#8b949e">{{P4_TAGS}}</text>
  <line x1="16" y1="216" x2="704" y2="216" stroke="#161b22" stroke-width="1"/>

  <!-- ── ROW 5 (title y=234, tags y=248) ────────────────────────────── -->
  <text x="16"  y="234"  class="t" font-size="11" fill="#a371f7">{{P5_NUM}}</text>
  <text x="44"  y="234"  class="t" font-size="12" font-weight="700" fill="#e6edf3">{{P5_TITLE}}</text>
  <text x="700" y="234"  class="t" font-size="10" fill="#484f58" text-anchor="end">{{P5_DT}}</text>
  <text x="44"  y="248"  class="t" font-size="10" fill="#8b949e">{{P5_TAGS}}</text>

  <!-- ── FOOTER ─────────────────────────────────────────────────────── -->
  <line x1="16"  y1="266" x2="704" y2="266" stroke="#21262d" stroke-width="1"/>
  <text x="16"  y="282" class="t" font-size="10" fill="#79c0ff">{{TS}}</text>
  <text x="704" y="282" class="t" font-size="10" fill="#8b949e" text-anchor="end">view all &#x2192;</text>
</svg>
