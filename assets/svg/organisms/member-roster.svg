<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420"
     role="img" aria-label="member roster — {{ROSTER_TITLE}}">
  <!--
  ═══════════════════════════════════════════════════════════════════
  ORGANISM: member-roster.svg
  Composes: atoms/level-dots  atoms/tag-chip  atoms/count-bubble
  ═══════════════════════════════════════════════════════════════════
  TOKENS (48 total):
    ROSTER_TITLE  ROSTER_TS  ROSTER_TOTAL

    Per member (6 rows × 7 tokens):
      Mx_INIT  Mx_NAME  Mx_ROLE  Mx_LV  Mx_TAGS  Mx_CO  Mx_TS
      Mx_D1 Mx_D2 Mx_D3 Mx_D4 Mx_D5   (level dot fills)

    COLOR presets for Mx_CO (role accent):
      Founder  #3fb950    Architect  #79c0ff
      Author   #a371f7    Reviewer   #e3b341
      Member   #8b949e    Inactive   #30363d

    Level dot fill: active=#3fb950  inactive=#21262d
    Use levelDotParams() helper in render.js to generate Mx_D1..D5 automatically.
  -->
  <defs>
    <style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style>
  </defs>

  <rect width="720" height="420" rx="10" fill="#0d1117"/>

  <!-- ── TITLEBAR ─────────────────────────────────────────────────── -->
  <rect x="0" y="0"  width="720" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="720" height="10"  fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="96" y="22" class="t" font-size="11" fill="#e6edf3" font-weight="600">{{ROSTER_TITLE}}</text>
  <rect x="638" y="8" width="66" height="20" rx="10" fill="#1b3a27" stroke="#3fb950" stroke-width="1" stroke-opacity=".5"/>
  <text x="671" y="22" text-anchor="middle" class="t" font-size="10" fill="#3fb950">{{ROSTER_TOTAL}} members</text>

  <!-- ── COLUMN HEADERS ────────────────────────────────────────────── -->
  <text x="72"  y="52" class="t" font-size="10" fill="#484f58" letter-spacing="1">MEMBER</text>
  <text x="300" y="52" class="t" font-size="10" fill="#484f58" letter-spacing="1">ROLE</text>
  <text x="436" y="52" class="t" font-size="10" fill="#484f58" letter-spacing="1">LEVEL</text>
  <text x="580" y="52" class="t" font-size="10" fill="#484f58" letter-spacing="1">LAST ACTIVE</text>
  <line x1="16" y1="58" x2="704" y2="58" stroke="#21262d" stroke-width="1"/>

  <!-- ── HELPER MACRO: each row is 56px tall, baseline at y+16 & y+30 ── -->

  <!-- ROW 1 (y=60) -->
  <circle cx="40"  cy="84" r="20" fill="#161b22" stroke="{{M1_CO}}" stroke-width="1.5"/>
  <text x="40"  y="89" text-anchor="middle" class="t" font-size="13" font-weight="700" fill="#e6edf3">{{M1_INIT}}</text>
  <text x="72"  y="79" class="t" font-size="12" font-weight="700" fill="#e6edf3">{{M1_NAME}}</text>
  <text x="72"  y="95" class="t" font-size="10" fill="#8b949e">{{M1_TAGS}}</text>
  <rect x="292" y="70" width="110" height="20" rx="3" fill="#161b22" stroke="{{M1_CO}}" stroke-width="1" stroke-opacity=".5"/>
