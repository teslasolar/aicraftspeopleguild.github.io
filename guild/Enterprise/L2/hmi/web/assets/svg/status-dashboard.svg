<text x="36" y="240" class="t vs">v1.0</text>
<rect x="260" y="56" width="220" height="220" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<g style="transform-origin:282px 86px">
    <circle cx="282" cy="86" r="11" fill="none" stroke="#f0883e" stroke-width="2" opacity=".5" class="pulse"/>
    <circle cx="282" cy="86" r="11" fill="none" stroke="#f0883e" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:.6s"/>
  </g>
  <circle cx="282" cy="86" r="7" class="o"/>
<text x="302" y="90" class="t lb">ENTERPRISE</text>
