# XcodeGen spec for one whitepaper app. Each the-harm-equation ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: TheHarmEquation
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TheHarmEquation:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "TheHarmEquation"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "The Harm Equation"
        ACGPaperAuthor:     "Public, Published, ACG Technical Committee, Commissioned by Alex Bunardzic"
        ACGPaperDate:       "March 2026"
        ACGPaperDocNumber:  "ACG-WP-002-2026"
        ACGPaperAbstract:   "Uncalibrated AI + Removed Humans + Commercial Incentive = Harm at Scale"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/the-harm-equation"
        ACGPaperThemeColor: "#6f42c1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.theharmequation"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
