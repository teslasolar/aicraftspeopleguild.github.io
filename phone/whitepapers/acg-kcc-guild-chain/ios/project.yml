# XcodeGen spec for one whitepaper app. Each acg-kcc-guild-chain ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: AcgKccGuildChain
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AcgKccGuildChain:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "AcgKccGuildChain"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "ACG-KCC: Guild Chain"
        ACGPaperAuthor:     ""
        ACGPaperDate:       "March 2026"
        ACGPaperDocNumber:  "acg-kcc-guild-chain"
        ACGPaperAbstract:   "Konomi Cube Coin Private Fork for AI Craftspeople Guild Operations"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/acg-kcc-guild-chain"
        ACGPaperThemeColor: "#a371f7"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.acgkccguildchain"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
