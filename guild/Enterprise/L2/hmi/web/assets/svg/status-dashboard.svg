<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-label="ACG status dashboard">
<defs>
    <linearGradient id="gBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .lb{fill:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1.6px}
      .va{fill:#e6edf3;font-size:20px;font-weight:700}
      .vs{fill:#e6edf3;font-size:14px;font-weight:600}
      .lo{fill:#79c0ff;font-size:11px}
      .sub{fill:#8b949e;font-size:11px}
      .g{fill:#3fb950} .a{fill:#e3b341} .r{fill:#f85149}
      .p{fill:#a371f7} .o{fill:#f0883e}
      .pulse{animation:plz 1.8s ease-out infinite}
      @keyframes plz{
        0%{transform:scale(1);opacity:.85}
        45%{transform:scale(1.35);opacity:.3}
        100%{transform:scale(1.8);opacity:0}
      }
      .spin{animation:sp 4s linear infinite;transform-origin:center}
      @keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    </style>
  </defs>
<rect width="960" height="300" rx="10" fill="url(#gBg)"/>
  <rect x="0" y="0" width="960" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="960" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="480" y="22" text-anchor="middle" class="t" font-size="12" fill="#8b949e">⚒ ACG status dashboard · live</text>
<rect x="20" y="56" width="220" height="220" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<g style="transform-origin:42px 86px">
    <circle cx="42" cy="86" r="11" fill="none" stroke="#3fb950" stroke-width="2" opacity=".5" class="pulse"/>
    <circle cx="42" cy="86" r="11" fill="none" stroke="#3fb950" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:.6s"/>
  </g>
  <circle cx="42" cy="86" r="7" class="g"/>
<text x="62" y="90" class="t lb">CATALOG</text>
