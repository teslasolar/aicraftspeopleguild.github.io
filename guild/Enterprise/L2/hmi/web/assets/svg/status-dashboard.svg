<rect x="740" y="56" width="220" height="220" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<g style="transform-origin:762px 86px">
    <circle cx="762" cy="86" r="11" fill="none" stroke="#3fb950" stroke-width="2" opacity=".5" class="pulse"/>
    <circle cx="762" cy="86" r="11" fill="none" stroke="#3fb950" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:.6s"/>
  </g>
  <circle cx="762" cy="86" r="7" class="g"/>
<text x="782" y="90" class="t lb">HEARTBEAT</text>
<text x="756" y="114" class="t sub">last</text>
<text x="756" y="136" class="t vs">2026-04-18 15:16Z</text>
