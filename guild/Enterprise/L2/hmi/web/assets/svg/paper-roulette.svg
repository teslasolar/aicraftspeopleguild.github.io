<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 180" width="1040" height="180" role="img" aria-label="random paper roulette">
<defs>
    <linearGradient id="gBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .lb{fill:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1.6px}
      .va{fill:#e6edf3;font-size:20px;font-weight:700}
      .vs{fill:#e6edf3;font-size:14px;font-weight:600}
      .lo{fill:#79c0ff;font-size:11px}
      .sub{fill:#8b949e;font-size:11px}
      .g{fill:#3fb950} .a{fill:#e3b341} .r{fill:#f85149}
      .p{fill:#a371f7} .o{fill:#f0883e}
      .pulse{animation:plz 1.8s ease-out infinite}
      @keyframes plz{
        0%{transform:scale(1);opacity:.85}
        45%{transform:scale(1.35);opacity:.3}
        100%{transform:scale(1.8);opacity:0}
      }
      .spin{animation:sp 4s linear infinite;transform-origin:center}
      @keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    </style>
  </defs>
<a href="https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/acg-net-decentralized-guild-web" target="_blank">
<rect width="1040" height="180" rx="10" fill="url(#gBg)"/>
  <rect x="0" y="0" width="1040" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="1040" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="520" y="22" text-anchor="middle" class="t" font-size="12" fill="#8b949e">⚒ paper roulette · 🎲 click for the current pick</text>
<text x="40" y="96" class="t" font-size="40">🎲</text>
<text x="104" y="86" class="t" font-size="20" font-weight="700" fill="#e6edf3">ACG-NET: Decentralized Guild Web</text>
<text x="104" y="110" class="t sub">ACG-NET, Federated GitHub Pages, Bloom Prompt  ·  March 2026  ·  </text>
<text x="104" y="134" class="t" font-size="11" fill="#8b949e" font-style="italic">Bloom Prompt · Federated GitHub Pages · P2P Member Sites…</text>
<text x="1020" y="88" text-anchor="end" class="t" font-size="12" fill="#79c0ff">open paper ↗</text>
<text x="1020" y="106" text-anchor="end" class="t sub">pick rerolls on every heartbeat</text>
</a>
</svg>