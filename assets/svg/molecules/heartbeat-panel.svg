<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130" role="img" aria-label="ACG heartbeat panel — live metrics">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"   stop-color="#3fb950" stop-opacity=".3"/>
      <stop offset="1"   stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .em{fill:#3fb950;font-size:26px;font-weight:700}
      .lb{fill:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1.5px}
      .va{fill:#e6edf3;font-size:20px;font-weight:700}
      .lo{fill:#79c0ff;font-size:11px}
      .pulse{animation:p 1.6s ease-out infinite;transform-origin:44px 82px}
      @keyframes p{0%{transform:scale(1);opacity:.8}50%{transform:scale(1.8);opacity:0}100%{transform:scale(1.8);opacity:0}}
      .ring{fill:none;stroke:#3fb950;stroke-width:2;opacity:.5}
      .dot{fill:#3fb950}
    </style>
  </defs>

  <!-- card bg -->
  <rect width="480" height="130" rx="10" fill="url(#g)"/>
  <!-- titlebar -->
  <rect x="0" y="0" width="480" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="480" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="240" y="22" text-anchor="middle" class="t" font-size="11" fill="#8b949e">&#x2692;  ACG heartbeat  &#xb7;  live metrics</text>

  <!-- pulse ring + dot -->
  <circle class="ring pulse"  cx="44" cy="82" r="14"/>
  <circle class="ring pulse"  cx="44" cy="82" r="14" style="animation-delay:.5s"/>
  <circle class="dot"         cx="44" cy="82" r="9"/>

  <!-- metric 1: papers -->
  <text x="80" y="72" class="t lb">papers</text>
  <text x="80" y="96" class="t em">25</text>

  <!-- metric 2: members -->
  <text x="160" y="72" class="t lb">members</text>
  <text x="160" y="96" class="t em" style="fill:#a371f7">8</text>

  <!-- metric 3: api -->
  <text x="248" y="72" class="t lb">api</text>
  <text x="248" y="96" class="t va">v1.0</text>

  <!-- sparkline (right side, x=320–460, y=54–110, 56px tall) -->
  <!-- data: 18 20 22 19 24 21 25 23 25 25 → y = 110 - val/28*52 -->
  <polygon
    points="320,77.6 335.6,73.8 351.1,70 366.7,75.7 382.2,65.3 397.8,69.1 413.3,63.5 428.9,67.3 444.4,63.5 460,63.5 460,110 320,110"
    fill="url(#sg)"/>
  <polyline
    points="320,77.6 335.6,73.8 351.1,70 366.7,75.7 382.2,65.3 397.8,69.1 413.3,63.5 428.9,67.3 444.4,63.5 460,63.5"
    fill="none" stroke="#3fb950" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="460" cy="63.5" r="3" fill="#3fb950"/>
  <text x="320" y="52" class="t lb" style="font-size:9px">papers / push</text>

  <!-- timestamp -->
  <text x="16"  y="120" class="t lo">updated 2026-04-18T08:55Z</text>
  <text x="464" y="120" text-anchor="end" class="t" font-size="10" fill="#484f58">auto-regenerated on push</text>
</svg>
