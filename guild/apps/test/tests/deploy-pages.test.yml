# tests/deploy-pages.test.yml
# Canonical workflow test, per the ACG-TEST standard section 6.
# This is the test-first artifact for the GitHub Pages deploy workflow.

test: GitHub Pages deploy
workflow: .github/workflows/deploy-pages.yml

exists:
  expect: present
  reason: "the deploy workflow file must exist or the site will never publish"

triggers:
  - event: push
    types: []
    paths:
      - index.html
      - pages/**
      - assets/**
      - tests/**
    expect: triggered
    reason: "any change to the site must republish the pages build"

  - event: workflow_dispatch
    expect: triggered
    reason: "maintainers must be able to trigger a manual redeploy without a push"

  - event: pull_request
    expect: not triggered
    reason: "PRs must not publish to production pages — review comes before deploy"

watches:
  - path: index.html
    expect: triggered
    reason: "changes to the entry point must republish"

  - path: pages/runner.html
    expect: triggered
    reason: "changes to any sub-page must republish"

  - path: assets/style.css
    expect: triggered
    reason: "style changes must republish"

  - path: tests/index.test.yml
    expect: triggered
    reason: "test-file changes must republish so the runner shows current data"

  - path: papers.json
    expect: triggered
    reason: "generated paper index must republish when regenerated by the paper-index workflow"

  - path: white-papers.html
    expect: triggered
    reason: "generated human-readable paper index must republish"

  - path: paper-auto-index-standard.html
    expect: triggered
    reason: "paper pages at repo root must republish when authored or updated"

  - path: README.md
    expect: not triggered
    reason: "README is not served by the site; changes alone should not redeploy"

secrets:
  - name: GITHUB_TOKEN
    expect: configured
    reason: "GITHUB_TOKEN is provided by Actions and required by the pages deploy action"

guardrails:
  - condition: workflow runs on a fork
    reason: "forks must not deploy to the upstream site — only the main repo publishes"

  - condition: deploy job runs on a non-main branch push
    reason: "only the default branch is allowed to publish the production site"
