<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>👥 Members · ACG</title>
<link rel="stylesheet" href="../L2/scada/gateway/styles/theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:linear-gradient(135deg,#faf6f0,#f0e8d8 50%,#f5ece0);color:var(--tx);font-family:var(--ff-body);font-size:13px;overflow:hidden;display:flex;flex-direction:column}
.hd{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bd);box-shadow:0 1px 3px var(--sh);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd h1{font-family:var(--ff-display);font-weight:700;font-size:17px;letter-spacing:.3px}
.hd h1 span{font-weight:400;color:var(--dm);font-size:13px;margin-left:6px}
.hd a{color:var(--tl);text-decoration:none;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);border:1px solid transparent}
.hd a:hover{background:var(--tlb);border-color:var(--tl)}
.hd .spacer{flex:1}
.hd .sum{font-family:var(--ff-mono);font-size:11px;color:var(--dm)}

.ctl{padding:8px 20px;background:var(--card);border-bottom:1px solid var(--bd2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctl input{padding:5px 10px;background:var(--inp);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:var(--ff-mono);font-size:11px;color:var(--tx);outline:none;flex:1;min-width:140px}
.ctl input:focus{border-color:var(--tl)}
.ctl label{font-size:11px;color:var(--dm)}

.wrap{flex:1;overflow:auto;padding:16px 20px}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;max-width:1300px;margin:0 auto}
.member-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:16px;box-shadow:0 1px 4px var(--sh);display:flex;flex-direction:column;gap:10px;transition:box-shadow .1s,border-color .1s}
.member-card:hover{box-shadow:0 3px 10px var(--sh);border-color:var(--bd2)}
.member-top{display:flex;align-items:center;gap:12px}
.member-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg);border:2px solid var(--bd);object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-weight:700;font-size:16px;color:var(--tl)}
.member-info{flex:1;min-width:0}
.member-name{font-family:var(--ff-display);font-weight:700;font-size:14px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-handle{font-family:var(--ff-mono);font-size:10px;color:var(--ft)}
.member-role{font-size:10px;font-family:var(--ff-mono);padding:2px 7px;border-radius:20px;background:var(--tlb);color:var(--tl);border:1px solid var(--tl);align-self:flex-start;white-space:nowrap}
.member-tags{display:flex;flex-wrap:wrap;gap:4px}
.member-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg);border:1px solid var(--bd2);color:var(--dm);font-family:var(--ff-body);cursor:pointer}
.member-tag:hover{border-color:var(--tl);color:var(--tl)}
.member-signed{font-family:var(--ff-mono);font-size:10px;color:var(--sg);display:flex;align-items:center;gap:4px}
.member-signed::before{content:'✓';font-weight:700}
.loading{padding:40px;text-align:center;color:var(--dm);font-style:italic}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z1CEF69ZSH"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-Z1CEF69ZSH');</script>
</head>
<body>
<div class="hd">
  <h1>👥 Members<span>· AI Craftspeople Guild</span></h1>
  <a href="../index.html">← enterprise</a>
  <a href="../papers/index.html">papers</a>
  <span class="spacer"></span>
  <span class="sum" id="sum">—</span>
</div>
<div class="ctl">
  <label>Search</label>
  <input id="f-search" placeholder="name / handle / expertise…" spellcheck="false">
</div>
<div class="wrap" id="wrap"><div class="loading">Loading members…</div></div>

<script>
const API = '../L4/api/members.json';
let allMembers = [];
let tagFilter = null;

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

async function load() {
  try {
    allMembers = await fetch(API + '?t=' + Date.now()).then(r => r.json());
  } catch { allMembers = []; }
  document.getElementById('sum').textContent = `${allMembers.length} members`;
  render();
}

function render() {
  const q = document.getElementById('f-search').value.toLowerCase();
  let members = allMembers.filter(m => {
    const haystack = [m.name, m.handle, m.role, m.org, ...(m.expertise_tags ?? [])].join(' ').toLowerCase();
    if (q && !haystack.includes(q)) return false;
    if (tagFilter && !(m.expertise_tags ?? []).includes(tagFilter)) return false;
    return true;
  });

  const wrap = document.getElementById('wrap');
  if (!members.length) {
    wrap.innerHTML = '<div class="loading">No members match.</div>';
    return;
  }

  wrap.innerHTML = `<div class="member-grid">${members.map(m => {
    const tags = m.expertise_tags ?? [];
    return `<div class="member-card">
      <div class="member-top">
        <div class="member-avatar">${initials(m.name)}</div>
        <div class="member-info">
          <div class="member-name">${m.name ?? m.handle}</div>
          <div class="member-handle">@${m.handle ?? ''}</div>
        </div>
        <span class="member-role">${m.role ?? ''}</span>
      </div>
      ${tags.length ? `<div class="member-tags">${tags.map(t =>
        `<span class="member-tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</div>` : ''}
      ${m.signed ? '<div class="member-signed">charter signed</div>' : ''}
    </div>`;
  }).join('')}</div>`;

  wrap.querySelectorAll('.member-tag').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.tag;
      if (tagFilter === t) { tagFilter = null; } else { tagFilter = t; }
      render();
    });
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('f-search').addEventListener('input', render);
load();
</script>
</body>
</html>
