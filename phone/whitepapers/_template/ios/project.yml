# XcodeGen spec for one whitepaper app. Each {{SLUG}} ships as its own
# standalone iOS bundle. Regenerate with `xcodegen generate` after a
# template change.
name: {{SLUG_PASCAL}}
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  {{SLUG_PASCAL}}:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "{{LABEL}}"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "{{IOS_BUNDLE_ID}}"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
