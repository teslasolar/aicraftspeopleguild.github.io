# XcodeGen spec for one whitepaper app. Each grid-brain ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: GridBrain
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GridBrain:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "GridBrain"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "Grid Brain"
        ACGPaperAuthor:     "GitHub Pages directory, Zero dependencies"
        ACGPaperDate:       ""
        ACGPaperDocNumber:  "grid-brain"
        ACGPaperAbstract:   "Bloom Prompt - GitHub Pages App - Lightning Factory Directory"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/grid-brain"
        ACGPaperThemeColor: "#e3b341"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.gridbrain"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
