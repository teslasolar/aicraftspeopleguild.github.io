name: ACGPapers
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ACGPapers:
    type: application
    platform: iOS
    sources:
      - path: ACGPapers
        excludes: ["Info.plist"]
    resources:
      - path: ACGPapers/Resources
    info:
      path: ACGPapers/Info.plist
      properties:
        CFBundleDisplayName: "ACG Papers"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aicraftspeopleguild.acg.papers
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
