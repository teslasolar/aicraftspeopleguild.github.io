<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛰 Mesh Topology · ACG</title>
<link rel="stylesheet" href="../L2/scada/gateway/styles/theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:linear-gradient(135deg,#faf6f0,#f0e8d8 50%,#f5ece0);color:var(--tx);font-family:var(--ff-body);font-size:13px;overflow:hidden;display:flex;flex-direction:column}
.hd{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bd);box-shadow:0 1px 3px var(--sh);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd h1{font-family:var(--ff-display);font-weight:700;font-size:17px;letter-spacing:.3px}
.hd h1 span{font-weight:400;color:var(--dm);font-size:13px;margin-left:6px}
.hd a{color:var(--tl);text-decoration:none;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);border:1px solid transparent}
.hd a:hover{background:var(--tlb);border-color:var(--tl)}
.hd .spacer{flex:1}
.hd .sum{font-family:var(--ff-mono);font-size:11px;color:var(--dm)}
.hd .sum b{color:var(--sg)}

.wrap{flex:1;overflow:auto;display:grid;grid-template-columns:1fr 300px;gap:0;background:var(--bd)}
@media(max-width:700px){.wrap{grid-template-columns:1fr;grid-template-rows:1fr auto}}

/* main canvas */
.canvas{background:var(--bg);padding:20px;overflow:auto;position:relative}
.peer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;max-width:100%}
.peer-node{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:14px;position:relative;transition:all .2s}
.peer-node.live{border-color:var(--sg);background:rgba(69,160,90,.04)}
.peer-node.stale{border-color:var(--am);opacity:.7}
.peer-node.offline{border-color:var(--bd2);opacity:.4}
.peer-dot{width:10px;height:10px;border-radius:50%;position:absolute;top:12px;right:12px}
.peer-dot.live{background:var(--sg)}
.peer-dot.stale{background:var(--am)}
.peer-dot.offline{background:var(--ft)}
.peer-source{font-family:var(--ff-mono);font-size:12px;font-weight:700;color:var(--tx);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px}
.peer-type{font-size:10px;font-family:var(--ff-mono);padding:2px 6px;border-radius:20px;background:var(--tlb);color:var(--tl);display:inline-block;margin-bottom:6px}
.peer-last{font-family:var(--ff-mono);font-size:10px;color:var(--ft)}
.peer-count{font-family:var(--ff-mono);font-size:10px;color:var(--dm);margin-top:4px}

/* event log */
.log-panel{background:var(--card);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.log-panel h3{font-family:var(--ff-display);font-size:12px;font-weight:700;color:var(--ft);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;flex-shrink:0}
.log-entry{font-size:11px;font-family:var(--ff-mono);border-bottom:1px solid var(--bd2);padding:5px 0;flex-shrink:0}
.log-entry:last-child{border:none}
.log-ts{color:var(--ft);font-size:10px}
.log-src{color:var(--tl);font-weight:600}
.log-evt{color:var(--dm)}
.log-evt.open{color:var(--sg)}
.log-evt.close{color:var(--rs)}

.empty-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--dm);font-family:var(--ff-display);font-style:italic}
.empty-canvas small{display:block;font-size:11px;font-family:var(--ff-body);margin-top:6px;color:var(--ft)}

.stat-bar{padding:7px 20px;background:var(--card);border-top:1px solid var(--bd);font-size:11px;color:var(--ft);display:flex;align-items:center;gap:14px;font-family:var(--ff-mono)}
.stat-bar b{color:var(--dm)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z1CEF69ZSH"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-Z1CEF69ZSH');</script>
</head>
<body>
<div class="hd">
  <h1>🛰 Mesh Topology<span>· ACG BroadcastChannel live</span></h1>
  <a href="../index.html">← enterprise</a>
  <a href="../L2/hmi/chat/index.html">chat</a>
  <a href="../apps/p2p/index/index.html">p2p</a>
  <span class="spacer"></span>
  <span class="sum" id="sum"><b>0</b> peers online</span>
</div>
<div class="wrap">
  <div class="canvas" id="canvas">
    <div class="peer-grid" id="peer-grid"></div>
    <div class="empty-canvas" id="empty-hint">
      Listening for peers…
      <small>Open other ACG subsystem pages to see them appear here.</small>
    </div>
  </div>
  <div class="log-panel" id="log-panel">
    <h3>Event Log</h3>
  </div>
</div>
<div class="stat-bar">
  <span><b id="st-live">0</b> live</span>
  <span><b id="st-stale">0</b> stale</span>
  <span><b id="st-msgs">0</b> messages total</span>
  <span id="st-ts">—</span>
</div>

<script type="module">
const CHANNEL    = 'acg-mesh';
const HEARTBEAT  = 5000;
const CLIENT_TTL = 15000;
const MAX_LOG    = 50;

const ch     = new BroadcastChannel(CHANNEL);
const peers  = new Map();  // source → {type, lastSeen, msgCount, status}
const log    = [];
let   totalMsgs = 0;

// Announce self
const SRC = 'mesh/topology';
function announce() {
  ch.postMessage({ source: SRC, type: 'heartbeat', ts: Date.now() });
}
announce();
setInterval(announce, HEARTBEAT);

ch.addEventListener('message', e => {
  const { source, type, ts } = e.data ?? {};
  if (!source) return;
  totalMsgs++;

  const prev = peers.get(source) ?? { msgCount: 0 };
  peers.set(source, {
    type:      type ?? 'unknown',
    lastSeen:  ts ?? Date.now(),
    msgCount:  prev.msgCount + 1,
    firstSeen: prev.firstSeen ?? Date.now(),
    status:    'live',
  });

  addLog(source, type);
  render();
});

function addLog(src, evt) {
  log.unshift({ src, evt, ts: Date.now() });
  if (log.length > MAX_LOG) log.pop();
}

function relTs(ms) {
  if (!ms) return '—';
  const d = (Date.now() - ms) / 1000;
  if (d < 5)   return 'just now';
  if (d < 60)  return `${Math.round(d)}s ago`;
  if (d < 3600) return `${Math.round(d/60)}m ago`;
  return `${Math.round(d/3600)}h ago`;
}

function render() {
  // update statuses
  const now = Date.now();
  for (const [src, p] of peers) {
    if (now - p.lastSeen > CLIENT_TTL) p.status = 'stale';
    else p.status = 'live';
  }

  // peer grid
  const grid = document.getElementById('peer-grid');
  const hint = document.getElementById('empty-hint');
  if (!peers.size) {
    grid.innerHTML = '';
    hint.style.display = '';
  } else {
    hint.style.display = 'none';
    const entries = [...peers.entries()].sort((a,b) => b[1].lastSeen - a[1].lastSeen);
    grid.innerHTML = entries.map(([src, p]) => `
      <div class="peer-node ${p.status}">
        <div class="peer-dot ${p.status}"></div>
        <div class="peer-source">${esc(src)}</div>
        <span class="peer-type">${esc(p.type)}</span>
        <div class="peer-last">last: ${relTs(p.lastSeen)}</div>
        <div class="peer-count">${p.msgCount} msg${p.msgCount !== 1 ? 's' : ''}</div>
      </div>`).join('');
  }

  // stats
  const live  = [...peers.values()].filter(p => p.status === 'live').length;
  const stale = [...peers.values()].filter(p => p.status === 'stale').length;
  document.getElementById('sum').innerHTML = `<b>${live}</b> peers online`;
  document.getElementById('st-live').textContent  = live;
  document.getElementById('st-stale').textContent = stale;
  document.getElementById('st-msgs').textContent  = totalMsgs;
  document.getElementById('st-ts').textContent    = 'updated ' + new Date().toLocaleTimeString();

  // event log
  const logEl = document.getElementById('log-panel');
  const logHtml = log.slice(0, 30).map(e => `
    <div class="log-entry">
      <div class="log-ts">${new Date(e.ts).toLocaleTimeString()}</div>
      <span class="log-src">${esc(e.src)}</span>
      <span class="log-evt ${e.evt}">&nbsp;${esc(e.evt)}</span>
    </div>`).join('');
  logEl.innerHTML = '<h3>Event Log</h3>' + (logHtml || '<div style="color:var(--ft);font-size:11px;padding:8px 0">No events yet.</div>');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Prune stale peers + re-render every 2s
setInterval(render, 2000);
render();
</script>
</body>
</html>
