<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110" role="img" aria-label="paper card — UDT System Design">
  <defs>
    <style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style>
  </defs>
  <rect width="380" height="110" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- category eyebrow -->
