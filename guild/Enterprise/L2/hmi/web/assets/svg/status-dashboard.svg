<rect x="500" y="56" width="220" height="220" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<g style="transform-origin:522px 86px">
    <circle cx="522" cy="86" r="11" fill="none" stroke="#a371f7" stroke-width="2" opacity=".5" class="pulse"/>
    <circle cx="522" cy="86" r="11" fill="none" stroke="#a371f7" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:.6s"/>
  </g>
  <circle cx="522" cy="86" r="7" class="p"/>
<text x="542" y="90" class="t lb">PIPELINE</text>
<text x="516" y="114" class="t sub">complete</text>
