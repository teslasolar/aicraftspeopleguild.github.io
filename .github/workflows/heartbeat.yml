name: heartbeat

# Bumps the dynamic tag `demo.heartbeat` on every push to main + every
# 15 minutes on a cron. Readers:
#   - README badge (shields.io img-dynamic-json)
#   - terminal `heartbeat` / `watch demo.heartbeat`
#   - any future GH webhook -> state:fire
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump demo.heartbeat tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TAG_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, sys
          from datetime import datetime, timezone

          sys.path.insert(0, 'guild/Enterprise/L2/lib')
          import gh_tag

          val = int(datetime.now(timezone.utc).timestamp())
          out = gh_tag.write(
              path='demo.heartbeat', value=val, quality='good',
              type='Counter',
              description=f'bumped at {datetime.now(timezone.utc).isoformat()} by heartbeat workflow',
          )
          print(json.dumps(out, indent=2))
          PY

      - name: Regenerate live SVG widgets
        env:
          GH_TAG_REPO: ${{ github.repository }}
        run: |
          python guild/Enterprise/L4/svg/build-heartbeat.py
          python guild/Enterprise/L4/svg/build-status-dashboard.py
          python guild/Enterprise/L4/svg/build-tag-grid.py
          python guild/Enterprise/L4/svg/build-pipeline-pulse.py
          python guild/Enterprise/L4/svg/build-readme-hero.py
          python guild/Enterprise/L4/svg/build-readme-controls.py
          python guild/Enterprise/L4/svg/build-readme-api.py
          python guild/Enterprise/L4/svg/build-scada-dashboard.py
          python guild/Enterprise/L4/svg/build-cmd-panel.py
          python guild/Enterprise/L4/svg/build-architecture.py
          python guild/Enterprise/L4/svg/build-tag-activity.py
          python guild/Enterprise/L4/svg/build-widget-gallery.py
          python guild/Enterprise/L4/svg/build-members-strip.py
          python guild/Enterprise/L4/svg/build-chat-llm-teaser.py
          python guild/Enterprise/L4/svg/build-paper-roulette.py

      - name: Commit SVG widgets if changed
        run: |
          git config user.name  "acg-heartbeat-bot"
          git config user.email "acg-heartbeat-bot@users.noreply.github.com"
          git add guild/Enterprise/L2/hmi/web/assets/svg/*.svg
          if git diff --cached --quiet; then
            echo "no SVG change"
          else
            git commit -m "heartbeat: regenerate SVG widget frames"
            git push
          fi
