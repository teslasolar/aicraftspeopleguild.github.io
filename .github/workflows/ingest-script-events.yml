name: ingest-script-events

# Refresh the StateMachineScript UDT instances whenever a file that can
# carry an @tag-event header is touched. The resulting JSONs live under
# guild/Enterprise/L3/udts/script/instances/ and feed the compressed
# UDT editor dropdown.
on:
  push:
    branches: [ main ]
    paths:
      - 'bin/**'
      - 'guild/Enterprise/L2/lib/**'
      - 'guild/Enterprise/L3/scripts/**'
      - 'guild/Enterprise/L4/api/scripts/**'
      - 'guild/Enterprise/L4/svg/**'
      - 'bin/ingest-script-events.py'
  workflow_dispatch:
    inputs:
      push_issues:
        description: 'Also upsert tag:script.<id> issues via gh_tag'
        required: false
        default: 'false'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ingest @tag-event headers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TAG_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event.inputs.push_issues }}" = "true" ]; then
            python bin/ingest-script-events.py --push
          else
            python bin/ingest-script-events.py
          fi

      - name: Commit + push UDT instance changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "acg-heartbeat-bot"
          git config user.email "acg-heartbeat-bot@users.noreply.github.com"
          git add guild/Enterprise/L3/udts/script/instances guild/Enterprise/L3/udts/machine/instances
          if git diff --cached --quiet; then
            echo "no UDT instance change"
            exit 0
          fi
          git commit -m "chore: refresh StateMachineScript UDT instances"
          if git push origin HEAD:main 2>&1 | tee /tmp/push.log; then
            echo "✓ pushed to main"
            exit 0
          fi
          if ! grep -q "protected branch" /tmp/push.log; then
            cat /tmp/push.log; exit 1
          fi
          echo "main protected · diverting to bot/udt-instances"
          git push -f origin HEAD:bot/udt-instances
          if command -v gh >/dev/null 2>&1; then
            existing=$(gh pr list --head bot/udt-instances --state open --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -z "$existing" ]; then
              gh pr create --base main --head bot/udt-instances \
                --title "chore: refresh StateMachineScript UDT instances" \
                --body "Auto-generated by ingest-script-events. Merge to publish the latest script inventory." || true
            fi
          fi
