# XcodeGen spec for one whitepaper app. Each ai-that-pisses-you-off-the-surprisingly ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: AiThatPissesYouOffTheSurprisingly
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AiThatPissesYouOffTheSurprisingly:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "AiThatPissesYouO"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "AI That Pisses You Off: The Surprisingly Effective Path to Deeper Thinking"
        ACGPaperAuthor:     "Guild Submission"
        ACGPaperDate:       "March 28, 2026"
        ACGPaperDocNumber:  "ai-that-pisses-you-off-the-surprisingly-effective-path-to-deeper-thinking"
        ACGPaperAbstract:   "Preserving Human Synthesis in the AI Craftspeople Guild"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/ai-that-pisses-you-off-the-surprisingly"
        ACGPaperThemeColor: "#c47a20"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.aithatpissesyouoffthesurprisingly"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
