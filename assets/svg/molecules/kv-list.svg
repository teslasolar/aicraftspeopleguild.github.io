<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" width="360" height="160" role="img" aria-label="properties">
  <!-- TOKENS: K1 V1 C1  K2 V2 C2  K3 V3 C3  K4 V4 C4 -->
  <!-- C = value color: #3fb950 ok · #e3b341 warn · #ff7b72 err · #e6edf3 neutral · #79c0ff info -->
  <defs><style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style></defs>
  <rect width="360" height="160" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <text x="16"  y="28"  class="t" font-size="11" fill="#8b949e">{{K1}}</text>
  <text x="344" y="28"  class="t" font-size="11" fill="{{C1}}" text-anchor="end">{{V1}}</text>
  <line x1="16" y1="40" x2="344" y2="40" stroke="#161b22" stroke-width="1"/>

  <text x="16"  y="64"  class="t" font-size="11" fill="#8b949e">{{K2}}</text>
  <text x="344" y="64"  class="t" font-size="11" fill="{{C2}}" text-anchor="end">{{V2}}</text>
  <line x1="16" y1="76" x2="344" y2="76" stroke="#161b22" stroke-width="1"/>

  <text x="16"  y="100" class="t" font-size="11" fill="#8b949e">{{K3}}</text>
  <text x="344" y="100" class="t" font-size="11" fill="{{C3}}" text-anchor="end">{{V3}}</text>
  <line x1="16" y1="112" x2="344" y2="112" stroke="#161b22" stroke-width="1"/>

  <text x="16"  y="136" class="t" font-size="11" fill="#8b949e">{{K4}}</text>
  <text x="344" y="136" class="t" font-size="11" fill="{{C4}}" text-anchor="end">{{V4}}</text>
</svg>
