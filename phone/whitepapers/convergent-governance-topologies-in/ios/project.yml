# XcodeGen spec for one whitepaper app. Each convergent-governance-topologies-in ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: ConvergentGovernanceTopologiesIn
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ConvergentGovernanceTopologiesIn:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "ConvergentGovern"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "Convergent Governance Topologies in Specialist Networks: A Comparative Analysis of Medieval Florentine Guild Structure and Modern Distributed Organizations"
        ACGPaperAuthor:     "Research Paper, Working Paper"
        ACGPaperDate:       "2026"
        ACGPaperDocNumber:  "convergent-governance-topologies-in-specialist-networks-a-comparative-analysis-of-medieval-florentine-guild-structure-and-modern-distributed-organizations"
        ACGPaperAbstract:   "Working Paper · AI Craftspeople Guild"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/convergent-governance-topologies-in"
        ACGPaperThemeColor: "#4a8868"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.convergentgovernancetopologiesin"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
