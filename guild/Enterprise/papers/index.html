<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📄 Papers · ACG</title>
<link rel="stylesheet" href="../L2/scada/gateway/styles/theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:linear-gradient(135deg,#faf6f0,#f0e8d8 50%,#f5ece0);color:var(--tx);font-family:var(--ff-body);font-size:13px;overflow:hidden;display:flex;flex-direction:column}
.hd{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bd);box-shadow:0 1px 3px var(--sh);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd h1{font-family:var(--ff-display);font-weight:700;font-size:17px;letter-spacing:.3px}
.hd h1 span{font-weight:400;color:var(--dm);font-size:13px;margin-left:6px}
.hd a{color:var(--tl);text-decoration:none;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-sm);border:1px solid transparent}
.hd a:hover{background:var(--tlb);border-color:var(--tl)}
.hd .spacer{flex:1}
.hd .sum{font-family:var(--ff-mono);font-size:11px;color:var(--dm)}

.ctl{padding:8px 20px;background:var(--card);border-bottom:1px solid var(--bd2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctl input,.ctl select{padding:5px 10px;background:var(--inp);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:var(--ff-mono);font-size:11px;color:var(--tx);outline:none}
.ctl input:focus,.ctl select:focus{border-color:var(--tl)}
.ctl input{flex:1;min-width:140px}
.ctl label{font-size:11px;color:var(--dm)}

.wrap{flex:1;overflow:auto;padding:16px 20px}
.paper-list{display:flex;flex-direction:column;gap:10px;max-width:900px;margin:0 auto}
.paper-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:16px;box-shadow:0 1px 4px var(--sh);transition:box-shadow .1s,border-color .1s}
.paper-card:hover{box-shadow:0 3px 10px var(--sh);border-color:var(--bd2)}
.paper-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.paper-type-badge{flex-shrink:0;font-size:10px;font-family:var(--ff-mono);padding:3px 8px;border-radius:20px;font-weight:700;border:1px solid;margin-top:2px}
.paper-type-badge.standard{background:var(--tlb);color:var(--tl);border-color:var(--tl)}
.paper-type-badge.architecture{background:rgba(180,140,60,.12);color:var(--am);border-color:var(--am)}
.paper-type-badge.component{background:rgba(69,160,90,.1);color:var(--sg);border-color:var(--sg)}
.paper-type-badge.spec{background:var(--bg);color:var(--dm);border-color:var(--bd)}
.paper-main{flex:1;min-width:0}
.paper-title{font-family:var(--ff-display);font-weight:700;font-size:15px;color:var(--tx);line-height:1.3}
.paper-title a{color:var(--tx);text-decoration:none}
.paper-title a:hover{color:var(--tl)}
.paper-meta{font-family:var(--ff-mono);font-size:10px;color:var(--ft);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.paper-meta span b{color:var(--dm)}
.status-badge{font-size:10px;font-family:var(--ff-mono);padding:2px 7px;border-radius:20px;font-weight:600}
.status-badge.published{background:rgba(69,160,90,.1);color:var(--sg)}
.status-badge.draft{background:rgba(180,140,60,.1);color:var(--am)}
.paper-abstract{font-size:12px;color:var(--dm);line-height:1.5;margin-top:6px}
.paper-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.paper-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg);border:1px solid var(--bd2);color:var(--ft);font-family:var(--ff-body)}
.loading{padding:40px;text-align:center;color:var(--dm);font-style:italic}
</style>
</head>
<body>
<div class="hd">
  <h1>📄 Papers<span>· ACG standards &amp; architecture</span></h1>
  <a href="../index.html">← enterprise</a>
  <a href="../members/index.html">members</a>
  <span class="spacer"></span>
  <span class="sum" id="sum">—</span>
</div>
<div class="ctl">
  <label>Search</label>
  <input id="f-search" placeholder="title / abstract / tag…" spellcheck="false">
  <label>Type</label>
  <select id="f-type"><option value="">ALL</option><option value="standard">standard</option><option value="architecture">architecture</option><option value="component">component</option><option value="spec">spec</option></select>
  <label>Status</label>
  <select id="f-status"><option value="">ALL</option><option value="published">published</option><option value="draft">draft</option></select>
</div>
<div class="wrap" id="wrap"><div class="loading">Loading papers…</div></div>

<script>
const API = '../../../papers.json';
let allPapers = [];

async function load() {
  try {
    allPapers = await fetch(API + '?t=' + Date.now()).then(r => r.json());
  } catch { allPapers = []; }
  document.getElementById('sum').textContent = `${allPapers.length} papers`;
  render();
}

function render() {
  const q      = document.getElementById('f-search').value.toLowerCase();
  const fType  = document.getElementById('f-type').value;
  const fStat  = document.getElementById('f-status').value;

  let papers = allPapers.filter(p => {
    const hay = [p.title, p.abstract, p.author, ...(p.tags ?? [])].join(' ').toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (fType && (p.type ?? '') !== fType) return false;
    if (fStat && (p.status ?? '') !== fStat) return false;
    return true;
  });

  const wrap = document.getElementById('wrap');
  if (!papers.length) {
    wrap.innerHTML = '<div class="loading">No papers match.</div>';
    return;
  }

  wrap.innerHTML = `<div class="paper-list">${papers.map(p => {
    const type = p.type ?? 'spec';
    const tags = p.tags ?? [];
    return `<div class="paper-card">
      <div class="paper-top">
        <span class="paper-type-badge ${type}">${type}</span>
        <div class="paper-main">
          <div class="paper-title">${p.url
            ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title ?? p.id)}</a>`
            : esc(p.title ?? p.id)}</div>
          <div class="paper-meta">
            <span><b>${p.id ?? ''}</b></span>
            <span>${p.author ?? ''}</span>
            <span>${p.date ?? ''}</span>
            <span class="status-badge ${p.status ?? 'draft'}">${p.status ?? 'draft'}</span>
          </div>
        </div>
      </div>
      ${p.abstract ? `<div class="paper-abstract">${esc(p.abstract)}</div>` : ''}
      ${tags.length ? `<div class="paper-tags">${tags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('f-search').addEventListener('input', render);
document.getElementById('f-type').addEventListener('change', render);
document.getElementById('f-status').addEventListener('change', render);
load();
</script>
</body>
</html>
