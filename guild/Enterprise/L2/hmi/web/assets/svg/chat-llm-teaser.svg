<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 260" width="1040" height="260" role="img" aria-label="chat with the guild · WebLLM">
<defs>
    <linearGradient id="gBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .lb{fill:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1.6px}
      .va{fill:#e6edf3;font-size:20px;font-weight:700}
      .vs{fill:#e6edf3;font-size:14px;font-weight:600}
      .lo{fill:#79c0ff;font-size:11px}
      .sub{fill:#8b949e;font-size:11px}
      .g{fill:#3fb950} .a{fill:#e3b341} .r{fill:#f85149}
      .p{fill:#a371f7} .o{fill:#f0883e}
      .pulse{animation:plz 1.8s ease-out infinite}
      @keyframes plz{
        0%{transform:scale(1);opacity:.85}
        45%{transform:scale(1.35);opacity:.3}
        100%{transform:scale(1.8);opacity:0}
      }
      .spin{animation:sp 4s linear infinite;transform-origin:center}
      @keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    </style>
  </defs>
<a href="https://teslasolar.github.io/aicraftspeopleguild.github.io/guild/Enterprise/L4/sandbox/web-llm/" target="_blank">
<rect width="1040" height="260" rx="10" fill="url(#gBg)"/>
  <rect x="0" y="0" width="1040" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="1040" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="520" y="22" text-anchor="middle" class="t" font-size="12" fill="#8b949e">⚒ chat with the guild · WebLLM · click to launch</text>
<g style="transform-origin:60px 120px"><circle cx="60" cy="120" r="14" fill="none" stroke="#a371f7" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:0.0s"/></g>
<g style="transform-origin:100px 120px"><circle cx="100" cy="120" r="14" fill="none" stroke="#a371f7" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:0.3s"/></g>
<g style="transform-origin:140px 120px"><circle cx="140" cy="120" r="14" fill="none" stroke="#a371f7" stroke-width="2" opacity=".5" class="pulse" style="animation-delay:0.6s"/></g>
<circle cx="100" cy="120" r="11" fill="#a371f7"/>
<text x="100" y="125" text-anchor="middle" class="t" font-size="13" fill="#fff">🧠</text>
<text x="190" y="102" class="t" font-size="30" font-weight="700" fill="#e6edf3">Chat with the guild</text>
<text x="190" y="132" class="t" font-size="14" fill="#8b949e">WebLLM engine · Phi-3 / Llama-3.2 · WebGPU · no server · no account · peer-shared via the mesh</text>
<g><rect x="40" y="166" rx="11" width="196" height="22" fill="none" stroke="#a371f7" stroke-width="1" opacity=".6"/><text x="138" y="181" text-anchor="middle" class="t" font-size="11" fill="#a371f7">🖥 runs in your browser</text></g>
<g><rect x="246" y="166" rx="11" width="204" height="22" fill="none" stroke="#3fb950" stroke-width="1" opacity=".6"/><text x="348" y="181" text-anchor="middle" class="t" font-size="11" fill="#3fb950">💾 cached after 1st load</text></g>
<g><rect x="460" y="166" rx="11" width="252" height="22" fill="none" stroke="#f0883e" stroke-width="1" opacity=".6"/><text x="586" y="181" text-anchor="middle" class="t" font-size="11" fill="#f0883e">🛰 shares context via p2p mesh</text></g>
<g><rect x="722" y="166" rx="11" width="244" height="22" fill="none" stroke="#3fb950" stroke-width="1" opacity=".6"/><text x="844" y="181" text-anchor="middle" class="t" font-size="11" fill="#3fb950">🔧 calls the acg tool catalog</text></g>
<text x="1010" y="108" text-anchor="end" class="t" font-size="13" fill="#79c0ff">launch ↗</text>
<text x="1010" y="130" text-anchor="end" class="t sub">teslasolar.github.io/aicraftspeopleguild.github.io/guild/E</text>
<text x="520" y="246" text-anchor="middle" class="t sub">First load downloads the model (~1-2 GB) into IndexedDB. Subsequent chats are instant.</text>
</a>
</svg>