# XcodeGen spec for one whitepaper app. Each structural-toast-carbonization-a-failure ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: StructuralToastCarbonizationAFailure
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  StructuralToastCarbonizationAFailure:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "StructuralToastC"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "Structural Toast Carbonization: A Failure Mode Distinct from Voluntary Technical Debt Acquisition"
        ACGPaperAuthor:     "Thomas Frumkin, Guild Submission, Research Paper, Second Look"
        ACGPaperDate:       ""
        ACGPaperDocNumber:  "structural-toast-carbonization-a-failure-mode-distinct-from-voluntary-technical-debt-acquisition"
        ACGPaperAbstract:   "Thomas Frumkin reflects on Kelly Hohman's toast-burning research paper"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/structural-toast-carbonization-a-failure"
        ACGPaperThemeColor: "#3fb950"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.structuraltoastcarbonizationafailure"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
