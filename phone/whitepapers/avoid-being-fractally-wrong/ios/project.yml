# XcodeGen spec for one whitepaper app. Each avoid-being-fractally-wrong ships as its own
# standalone iOS bundle. Paper metadata lives in Info.plist custom
# keys (ACGPaper*) so Swift never has to escape title / abstract text.
name: AvoidBeingFractallyWrong
options:
  bundleIdPrefix: com.aicraftspeopleguild.acg.papers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AvoidBeingFractallyWrong:
    type: application
    platform: iOS
    sources:
      - path: ACG
    info:
      path: ACG/Info.plist
      properties:
        CFBundleDisplayName: "AvoidBeingFracta"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ACGPaperTitle:      "Avoid Being Fractally Wrong"
        ACGPaperAuthor:     "Alex Bunardzic"
        ACGPaperDate:       "Apr 06, 2026"
        ACGPaperDocNumber:  "avoid-being-fractally-wrong"
        ACGPaperAbstract:   "Fail early, fail often"
        ACGPaperUrl:        "https://teslasolar.github.io/aicraftspeopleguild.github.io/#/whitepapers/avoid-being-fractally-wrong"
        ACGPaperThemeColor: "#c47a20"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.aicraftspeopleguild.acg.papers.avoidbeingfractallywrong"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
