<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" role="img" aria-label="sparkline atom — papers per week">
  <defs>
    <linearGradient id="sg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"   stop-color="#3fb950" stop-opacity=".35"/>
      <stop offset="1"   stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style>
  </defs>
  <rect width="200" height="80" rx="8" fill="#0d1117"/>

  <!-- grid lines -->
  <line x1="16" y1="62" x2="184" y2="62" stroke="#21262d" stroke-width="1"/>
  <line x1="16" y1="44" x2="184" y2="44" stroke="#21262d" stroke-width=".5"/>
  <line x1="16" y1="26" x2="184" y2="26" stroke="#21262d" stroke-width=".5"/>

  <!-- area fill (data: 30 45 35 55 48 65 58 70 62 72, mapped to y=62..14, range=48px) -->
  <polygon
    points="16,47.6 34.7,40.4 53.3,45.2 72,35.6 90.7,39 109.3,30.8 128,34.2 146.7,28.4 165.3,32.2 184,27.4 184,62 16,62"
    fill="url(#sg)"/>

  <!-- line -->
  <polyline
    points="16,47.6 34.7,40.4 53.3,45.2 72,35.6 90.7,39 109.3,30.8 128,34.2 146.7,28.4 165.3,32.2 184,27.4"
    fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- end dot -->
  <circle cx="184" cy="27.4" r="3" fill="#3fb950"/>

  <!-- labels -->
  <text x="16"  y="14" class="t" font-size="10" fill="#8b949e">papers / wk</text>
  <text x="184" y="14" class="t" font-size="10" fill="#3fb950" text-anchor="end">72</text>
  <text x="16"  y="76" class="t" font-size="9"  fill="#30363d">w1</text>
  <text x="184" y="76" class="t" font-size="9"  fill="#30363d" text-anchor="end">w10</text>
</svg>
