<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" width="320" height="48" role="img" aria-label="progress bar atom — papers indexed 72%">
  <defs>
    <linearGradient id="pg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#4de869"/>
    </linearGradient>
    <clipPath id="pc"><rect x="16" y="28" width="288" height="8" rx="4"/></clipPath>
    <style>.t{font-family:'SFMono-Regular',Consolas,monospace}</style>
  </defs>
  <rect width="320" height="48" rx="8" fill="#0d1117"/>

  <!-- label row -->
  <text x="16"  y="20" class="t" font-size="11" fill="#8b949e">papers indexed</text>
  <text x="304" y="20" class="t" font-size="11" fill="#3fb950" text-anchor="end">72%</text>

  <!-- track -->
  <rect x="16" y="28" width="288" height="8" rx="4" fill="#21262d"/>
  <!-- fill (72% = 207.4px) -->
  <rect x="16" y="28" width="207" height="8" rx="4" fill="url(#pg)" clip-path="url(#pc)"/>
</svg>
